<!doctype html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>건물주이야기 프롤로그</title>
    <link rel="stylesheet" href="/styles.css">
</head>
<body>
<main class="story-page">
    <header class="story-head">
        <span class="logo">B</span>
        <div>
            <h1>건물주이야기: 첫 번째 월세</h1>
            <p>첫 로그인 프롤로그</p>
        </div>
    </header>

    <section class="story-grid">
        <article class="story-card">
            <div class="story-image">AI 이미지 1</div>
            <h2>해고</h2>
            <p>“오늘부로 그만 나와도 됩니다.”</p>
        </article>
        <article class="story-card">
            <div class="story-image">AI 이미지 2</div>
            <h2>막막한 밤</h2>
            <p>통장 잔고도, 내일의 계획도 흐릿했다.</p>
        </article>
        <article class="story-card">
            <div class="story-image">AI 이미지 3</div>
            <h2>신비한 조언</h2>
            <p>“전생에 쌓은 복이 남아 있군. 건물 관리법을 알려주겠다.”</p>
        </article>
        <article class="story-card">
            <div class="story-image">AI 이미지 4</div>
            <h2>청주에서 시작</h2>
            <p>청주 원룸 한 채. 작지만 첫 월세의 시작이다.</p>
        </article>
    </section>

    <form method="post" action="/story/complete" class="story-action">
        <button type="submit">청주 원룸 받고 시작하기</button>
    </form>
</main>
</body>
</html>
