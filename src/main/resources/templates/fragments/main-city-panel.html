<!doctype html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<body>
<section th:fragment="cityPanel" class="city-panel">
    <div class="section-head">
        <div>
            <h2 th:text="${player.currentCity}">мІӯмЈј</h2>
            <p>
                ліҙмң  кұҙл¬ј <span th:text="${buildings.size()}">0</span>/8 В·
                мһ…мЈј <span th:text="${@gameService.effectiveMoveInChancePercentText(player, player.currentCity)}">35%</span> В·
                нҮҙкұ° <span th:text="${@gameService.effectiveMoveOutChancePercentText(player, player.currentCity)}">25%</span> В·
                мҲҳлҰ¬ <span th:text="${@gameService.effectiveRepairRequestChancePercentText(player, player.currentCity)}">35%</span>
                <span th:if="${@gameService.rentBonusPercent(player, player.currentCity) > 0}" th:text="' В· мӣ”м„ё +' + ${@gameService.rentBonusPercentText(player, player.currentCity)}">мӣ”м„ё</span>
                <span th:if="${@gameService.buildingWaitReductionPercent(player, player.currentCity) > 0}" th:text="' В· кұҙл¬јлҢҖкё°мӢңк°„ -' + ${@gameService.buildingWaitReductionPercentText(player, player.currentCity)}">лҢҖкё°</span>
                <span th:if="${!@gameService.marketNewsStatusText(player, player.currentCity).isBlank()}" th:text="' В· ' + ${@gameService.marketNewsStatusText(player, player.currentCity)}">лүҙмҠӨ</span>
            </p>
        </div>
        <div class="quick-actions">
            <button id="sideJobBtn" type="button" th:disabled="${player.paused}" th:text="${player.paused ? 'мқјмӢңм •м§Җ' : 'л¶Җм—…'}">л¶Җм—…</button>
            <form method="post" action="/resign" th:if="${player.employed}">
                <button class="danger-button" type="submit" th:disabled="${player.paused || !player.canResign()}" th:text="${player.paused ? 'мқјмӢңм •м§Җ' : (player.canResign() ? 'нҮҙмӮ¬' : 'нҮҙмӮ¬ ' + player.ddayText(player.daysUntilResignAvailable()))}">нҮҙмӮ¬</button>
            </form>
        </div>
    </div>

    <div class="skyline" th:classappend="' city-bg-' + ${@gameService.cityBackgroundClass(player.currentCity)}">
        <div class="sun"></div>
        <div class="cloud cloud-a"></div>
        <div class="cloud cloud-b"></div>

        <article th:each="building : ${buildings}" class="building-slot owned" th:classappend="${buildingStat.index == 0} ? ' selected'" th:attr="data-building=${building.name}, data-building-id=${building.id}">
            <span th:if="${building.secretaryResident}" class="sale-lock-badge">нҢҗл§Өл¶Ҳк°Җ</span>
            <span th:if="${building.tenantProtectedDaysLeft(player.elapsedDays) > 0}" class="protection" th:text="'ліҙнҳё D-' + ${building.tenantProtectedDaysLeft(player.elapsedDays)}">ліҙнҳё</span>
            <form th:if="${building.repairRequested}" method="post" th:action="@{/buildings/{id}/repair(id=${building.id})}">
                <button class="repair" type="submit" th:disabled="${player.paused || player.cash < building.repairCost()}" th:text="${player.paused ? 'мқјмӢңм •м§Җ' : (player.cash < building.repairCost() ? 'мҲҳлҰ¬л№„ л¶ҖмЎұ' : 'мҲҳлҰ¬мҡ”мІӯ')}">мҲҳлҰ¬мҡ”мІӯ</button>
            </form>
            <img class="building-image" th:src="${@gameService.buildingImagePath(building)}" th:alt="${building.name} + ' мқҙлҜём§Җ'">
            <strong th:text="${building.name} + ' #' + ${buildingStat.count}">кұҙл¬јлӘ…</strong>
            <span th:text="${(@gameService.secretaryTenantStatusText(building).isBlank() ? (building.occupied ? (building.protectedTenant ? 'нӣ„л°° кұ°мЈјмӨ‘' : 'мһ…мЈјмӨ‘') : 'кіөмӢӨ') : @gameService.secretaryTenantStatusText(building)) + ' В· ' + (@gameService.rentWaivedBySecretaryEvent(player, building) ? 'мӣ”м„ё к°җл©ҙ' : 'мӣ”м„ё ' + @moneyText.format(@gameService.effectiveMonthlyRent(player, building)))}">мғҒнғң</span>
        </article>

        <button th:each="slot : ${#numbers.sequence(1, 8 - buildings.size())}" class="building-slot empty" th:if="${buildings.size() < 8}">
            <div class="empty-plus">+</div>
            <strong>л№Ҳ л¶Җм§Җ</strong>
            <span>л§Өл¬ј кө¬л§Ө к°ҖлҠҘ</span>
        </button>
    </div>
</section>
</body>
</html>
